name: arcanos_mayores
description: PsicoTarot - Arcanos Mayores App
publish_to: 'none'
version: 2.1.0+4

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  path: ^1.9.1
  intl: ^0.20.2
  package_info_plus: ^9.0.1
  dio: ^5.9.2
  open_filex: ^4.7.0
  flutter_launcher_icons: ^0.14.4
  flutter_local_notifications: ^18.0.0

  http: ^1.2.0
  pdf: ^3.11.0
  share_plus: ^10.1.0
  shared_preferences: ^2.3.0
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  sqflite_common_ffi: ^2.3.6

flutter:
  uses-material-design: true
  assets:
    - assets/cards/
    - assets/icon_original.png

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon_original.png"
  adaptive_icon_background: "#6A1B9A"
  adaptive_icon_foreground: "assets/icon_original.png"
